# Diffusion Policy with Transformer noise network
name: diffusion_transformer
type: diffusion

hidden_dim: 512
num_train_timesteps: 100
num_inference_steps: 10
schedule: cosine
ddim_eta: 0.0

# Transformer-specific
num_heads: 8
num_layers: 4
dropout: 0.1

il:
  lr: 1e-4
  weight_decay: 1e-6
  num_epochs: 150
  batch_size: 128
  aln_lr: 3e-4
  aln_warmup_steps: 500
