# Diffusion Policy with CNN noise network
name: diffusion_cnn
type: diffusion

hidden_dim: 256
num_train_timesteps: 100
num_inference_steps: 10
schedule: cosine
ddim_eta: 0.0

# IL pre-training
il:
  lr: 1e-4
  weight_decay: 1e-6
  num_epochs: 100
  batch_size: 256
  aln_lr: 3e-4
  aln_warmup_steps: 500
